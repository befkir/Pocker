apiVersion: apps/v1
kind: Deployment
metadata:
  name: poker-frontend
  labels:
    app: poker
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poker
      component: frontend
  template:
    metadata:
      labels:
        app: poker
        component: frontend
    spec:
      containers:
        - name: frontend
          image: gcr.io/pocker-488812/poker-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          env:
            - name: BACKEND_URL
              value: "http://poker-backend:8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: poker-frontend
  labels:
    app: poker
    component: frontend
spec:
  selector:
    app: poker
    component: frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  type: LoadBalancer
