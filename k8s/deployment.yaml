apiVersion: apps/v1
kind: Deployment
metadata:
  name: poker-backend
  labels:
    app: poker
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poker
      component: backend
  template:
    metadata:
      labels:
        app: poker
        component: backend
    spec:
      containers:
        - name: backend
          image: gcr.io/pocker-488812/poker-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: poker-backend
  labels:
    app: poker
    component: backend
spec:
  selector:
    app: poker
    component: backend
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  type: ClusterIP
